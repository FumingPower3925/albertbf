name: PR Preview

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    name: Deploy Preview
    # Same-repo PRs only: fork PRs get no secrets, and Dependabot runs receive
    # Dependabot secrets (not repo secrets) with a read-only token.
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build static site
        run: bun run build

      - name: Upload preview version
        id: upload
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: versions upload --preview-alias pr-${{ github.event.pull_request.number }}

      - name: Extract preview URLs
        id: urls
        env:
          COMMAND_OUTPUT: ${{ steps.upload.outputs.command-output }}
        run: |
          ALIAS_URL=$(echo "$COMMAND_OUTPUT" | grep -oE 'https://pr-[0-9]+-[a-z0-9-]+\.[a-z0-9-]+\.workers\.dev' | head -1)
          VERSION_URL=$(echo "$COMMAND_OUTPUT" | grep -oE 'https://[a-z0-9]+-[a-z0-9-]+\.[a-z0-9-]+\.workers\.dev' | head -1)
          echo "alias_url=${ALIAS_URL:-$VERSION_URL}" >> "$GITHUB_OUTPUT"
          echo "version_url=${VERSION_URL}" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: preview
          message: |
            ### ☁️ Cloudflare preview

            | | |
            |---|---|
            | **Preview (sticky)** | ${{ steps.urls.outputs.alias_url }} |
            | **This push** | ${{ steps.urls.outputs.version_url }} |
            | **Commit** | `${{ github.event.pull_request.head.sha }}` |
