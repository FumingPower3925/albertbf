name: Blog CI

on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build static site
        run: bun run build

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: ./dist

  html-validate:
    name: HTML Validation
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: ./dist

      - name: Validate HTML
        run: npx --yes html-validate "dist/**/*.html"

  lighthouse:
    name: Lighthouse Audit
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: ./dist

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: './.github/lighthouse/lighthouserc.json'
          uploadArtifacts: true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  link-checker:
    name: Broken Link Check
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: ./dist

      - name: Start a local server
        run: npx http-server ./dist -p 8080 &

      - name: Wait for server to be ready
        run: npx wait-on http://localhost:8080

      - name: Run Lychee Link Checker
        uses: lycheeverse/lychee-action@v2
        with:
          # Checks every internal link across all pages and articles (rewritten
          # to the local server via --base), plus external links. Excludes:
          #  - self-referential absolute albertbf.com URLs (canonical/OG/JSON-LD
          #    and same-site links): the new deep paths resolve only after merge;
          #  - hosts that throttle or deny automated checkers and thus flake:
          #    linkedin.com (HTTP 999), x.com, and upc.edu (times out on CI).
          #    All are stable, human-verified links.
          args: "--base http://localhost:8080 --verbose --no-progress --timeout 30 --max-retries 3 --retry-wait-time 5 --exclude '^https://albertbf\\.com' --exclude 'linkedin\\.com' --exclude '(^|\\.)x\\.com' --exclude 'upc\\.edu' './**/*.html'"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
