name = "albertbf-blog"
main = "src/index.ts"
compatibility_date = "2025-06-01"
workers_dev = false
preview_urls = true

[build]
command = "bun run build"

[assets]
directory = "./dist"
html_handling = "auto-trailing-slash"
not_found_handling = "404-page"

routes = [
  { pattern = "albertbf.com/*", custom_domain = true }
]

[vars]
ENVIRONMENT = "production"
