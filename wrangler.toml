name = "albertbf-blog"
main = "src/worker/index.ts"
compatibility_date = "2025-06-01"
workers_dev = false
preview_urls = true

[build]
command = "bun run build"

[assets]
directory = "./dist"
binding = "ASSETS"
html_handling = "auto-trailing-slash"
not_found_handling = "404-page"
run_worker_first = ["/api/*", "/health"]

routes = [
  { pattern = "albertbf.com/*", custom_domain = true }
]

[vars]
ENVIRONMENT = "production"

# Account-level rate limiter shared across isolates, gating the Go-run proxy.
# 6 requests / 60s per client IP.
[[unsafe.bindings]]
name = "RUN_RL"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 6, period = 60 }
